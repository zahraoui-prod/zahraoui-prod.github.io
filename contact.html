<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا | ZAHRAOUI PROD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: 'Cairo', sans-serif;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .social-btn {
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
        }
        .whatsapp { background: #25D366; }
        .instagram { background: #E1306C; }
        .email { background: #004E89; }
    </style>
</head>
<body>
    <header class="main-header">
        <nav class="container">
            <div class="logo">ZAHRAOUI PROD 🎵</div>
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="index.html#about">من نحن</a></li>
                <li><a href="index.html#services">الخدمات</a></li>
                <li><a href="artists.html">الفنانون</a></li>
                <li><a href="contact.html">تواصل معنا</a></li>
            </ul>
        </nav>
    </header>

    <section class="contact-section">
        <div class="container">
            <h2 class="section-title">تواصل معنا</h2>
            <div class="contact-container">
                <form id="contactForm">
                    <div class="form-group">
                        <label>الاسم الكامل</label>
                        <input type="text" placeholder="أدخل اسمك هنا" required>
                    </div>
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>الموضوع</label>
                        <input type="text" placeholder="ما هو موضوع استفسارك؟">
                    </div>
                    <div class="form-group">
                        <label>الرسالة</label>
                        <textarea rows="5" placeholder="اكتب رسالتك هنا..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; border: none;">إرسال الرسالة</button>
                </form>

                <div class="social-links">
                    <a href="#" class="social-btn email">📧 البريد الإلكتروني</a>
                    <a href="#" class="social-btn instagram">📱 Instagram</a>
                    <a href="#" class="social-btn whatsapp">💬 WhatsApp</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 ZAHRAOUI PROD. جميع الحقوق محفوظة.</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
