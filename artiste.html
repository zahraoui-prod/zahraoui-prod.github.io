<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="تفاصيل الفنان - ZAHRAOUI PROD">
    <meta name="theme-color" content="#0a0a0a">
    <title>تفاصيل الفنان - ZAHRAOUI PROD</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <!-- تم تصحيح رابط الأيقونات هنا -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo">
                <div class="logo-box">ZP</div>
                <div>
                    <h1>ZAHRAOUI</h1>
                    <p>PROD</p>
                </div>
            </a>
            <div class="navbar-links">
                <a href="index.html">الرئيسية</a>
                <a href="artists.html">الفنانون</a>
                <a href="works.html">الأعمال</a>
                <a href="contact.html">تواصل معنا</a>
            </div>
            <button class="mobile-menu-btn">☰</button>
        </div>
    </nav>

    <!-- Artist Hero Section -->
    <section style="padding: 80px 5%; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 80vh; display: flex; align-items: center;">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; flex-wrap: wrap-reverse; align-items: center; gap: 40px; width: 100%;">
            
            <!-- الجانب الأيمن: النصوص -->
            <div style="flex: 1; min-width: 300px; text-align: right;">
                <h1 id="artist-name" style="font-size: 3.5rem; margin-bottom: 10px; color: #fff;">اسم الفنان</h1>
                <p id="artist-genre" style="font-size: 1.2rem; color: #00d2ff; margin-bottom: 20px; font-weight: bold;">تحميل التخصص...</p>
                <p id="artist-description" style="font-size: 1.1rem; line-height: 1.8; color: #ccc; margin-bottom: 30px;">
                    جاري تحميل تفاصيل الفنان...
                </p>

                <!-- Social Media & Links Section -->
                <div style="margin-top: 30px;">
                    <div id="artist-social-links" style="display: flex; gap: 15px; justify-content: flex-end; margin-bottom: 25px;">
                        <a id="link-facebook" href="#" target="_blank" style="color: #fff; font-size: 1.5rem; transition: 0.3s;"><i class="fab fa-facebook"></i></a>
                        <a id="link-instagram" href="#" target="_blank" style="color: #fff; font-size: 1.5rem; transition: 0.3s;"><i class="fab fa-instagram"></i></a>
                        <a id="link-tiktok" href="#" target="_blank" style="color: #fff; font-size: 1.5rem; transition: 0.3s;"><i class="fab fa-tiktok"></i></a>
                        <a id="link-youtube" href="#" target="_blank" style="color: #fff; font-size: 1.5rem; transition: 0.3s;"><i class="fab fa-youtube"></i></a>
                    </div>

                    <div style="margin-bottom: 30px;">
                        <a id="link-works" href="#" target="_blank" style="display: block; text-align: center; padding: 12px; background: rgba(255,255,255,0.1); border: 1px dashed #00d2ff; color: #00d2ff; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s;">
                            <i class="fas fa-external-link-alt" style="margin-left: 10px;"></i> مشاهدة جميع الأعمال (Linktree)
                        </a>
                    </div>

                    <div style="display: flex; gap: 15px; justify-content: flex-end;">
                        <a href="contact.html" style="padding: 12px 30px; background: #00d2ff; color: #050505; text-decoration: none; border-radius: 5px; font-weight: bold;">تواصل معنا</a>
                        <a href="artists.html" style="padding: 12px 30px; border: 1px solid #00d2ff; color: #00d2ff; text-decoration: none; border-radius: 5px; font-weight: bold;">العودة للفنانين</a>
                    </div>
                </div>
            </div>

            <!-- الجانب الأيسر: الصورة -->
            <div style="flex: 1; min-width: 300px; display: flex; justify-content: center;">
                <div style="width: 400px; height: 400px; border-radius: 10px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5); background: #1a0033; display: flex; align-items: center; justify-content: center;">
                    <img id="artist-main-img" src="" alt="Artist" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                    <span id="fallback-icon" style="font-size: 8rem; color: #00d2ff;">🎤</span>
                </div>
            </div>
        </div>
    </section>

    <!-- باقي المحتوى (Stats, Works, Footer) يبقى كما هو... -->
    
    <script src="script.js"></script>
</body>
</html>
